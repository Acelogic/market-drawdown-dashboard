name: Fetch Live Quotes

on:
  schedule:
    # Every 5 minutes during US market hours (9:30 AM - 4:00 PM ET = 13:30 - 20:00 UTC)
    # Monday through Friday
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch quotes
        run: python scripts/fetch_live_quotes.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          git diff --cached --quiet || git commit -m "data: update live quotes"
          git push
