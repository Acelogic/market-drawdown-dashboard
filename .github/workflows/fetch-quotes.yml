name: Fetch Live Quotes

on:
  schedule:
    # Every 5 minutes during US market hours + after-hours (9:30 AM - 5:00 PM ET = 13:30 - 21:00 UTC)
    - cron: '*/5 13-21 * * 1-5'
    # A few pre-market and overnight runs so data never goes 16+ hours stale
    - cron: '0 0,4,8,12 * * 1-5'
    # Once on weekends (keeps the "last updated" from drifting to Friday)
    - cron: '0 14 * * 0,6'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch quotes
        run: python scripts/fetch_live_quotes.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          git diff --cached --quiet || git commit -m "data: update live quotes"
          git push
